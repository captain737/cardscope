name: Daily Credit Card Crawl

# Refreshes the Supabase `cards` table that the live site reads from.
# The site updates automatically once this runs — no redeploy needed, since
# card data lives in Supabase, not in the frontend bundle.

on:
  schedule:
    # 9:00 AM UTC daily — adjust for your audience's timezone
    - cron: "0 9 * * *"
  workflow_dispatch: {}  # manual trigger from the Actions tab for testing

# Never let two crawls run at once (a slow run overlapping the next schedule).
concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        # The crawler is a subdirectory of this monorepo; run everything from it.
        working-directory: crawler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist the crawl cache across runs so we only spend LLM tokens on
      # new/changed pages. Keyed per-run with a rolling restore so each run
      # loads the most recent previous cache, then saves an updated one.
      # This replaces the old "commit data back to git" step — committing to
      # main daily would trigger a needless Vercel redeploy every morning.
      - name: Restore crawl cache
        uses: actions/cache@v4
        with:
          path: crawler/data
          key: crawl-cache-${{ github.run_id }}
          restore-keys: |
            crawl-cache-

      - name: Run crawler pipeline
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # 8B keeps a full multi-provider run inside Groq's free tier —
          # daily token limits are per model, and the 70B runs out mid-run.
          CLASSIFY_MODEL: llama-3.1-8b-instant
          EXTRACT_MODEL: llama-3.1-8b-instant
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m src.pipeline

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-logs-${{ github.run_id }}
          path: crawler/logs/
          retention-days: 14
          if-no-files-found: ignore

# Setup notes:
#   1. Add these repo secrets (Settings -> Secrets and variables -> Actions):
#        GROQ_API_KEY          required, free — https://console.groq.com/keys
#        SUPABASE_URL          your Supabase project URL (the cardscope DB)
#        SUPABASE_SERVICE_KEY  Supabase service_role key (server-side only)
#        SLACK_WEBHOOK_URL     optional, for failure alerts
#   2. Trigger a manual run anytime from the Actions tab ("Run workflow")
#      to update on demand without waiting for the 9 AM schedule.
